name: main_avantika-secretary-ai

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile critical modules
        run: |
          python -m py_compile \
            config.py \
            secretary_agent.py \
            agent.py \
            app/main.py \
            app/db.py \
            app/schemas.py \
            app/services/browser_automation.py \
            app/services/companies.py \
            app/services/integrations.py \
            app/services/jobs.py \
            app/services/parsers.py \
            app/services/pipeline.py \
            app/services/reminders.py \
            app/services/travel.py \
            app/services/user_mgmt.py \
            app/services/web_chat.py \
            app/services/whatsapp.py \
            app/services/whatsapp_store.py

      - name: Verify health endpoints are defined
        run: |
          grep -q '@app.get("/health")' app/main.py
          grep -q '@app.get("/whatsapp/health")' app/main.py
          grep -q 'return {"status": "ok"}' app/main.py

      - name: Validate workflow inputs
        run: |
          test -f requirements.txt
          test -f app/main.py
          test -f secretary_agent.py

name: main_avantika-secretary-ai

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile critical modules
        run: |
          python -m py_compile \
            config.py \
            secretary_agent.py \
            agent.py \
            app/main.py \
            app/db.py \
            app/schemas.py \
            app/services/browser_automation.py \
            app/services/companies.py \
            app/services/integrations.py \
            app/services/jobs.py \
            app/services/parsers.py \
            app/services/pipeline.py \
            app/services/reminders.py \
            app/services/travel.py \
            app/services/user_mgmt.py \
            app/services/web_chat.py \
            app/services/whatsapp.py \
            app/services/whatsapp_store.py

      - name: Smoke test FastAPI routes
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)
          assert client.get("/health").status_code == 200
          assert client.get("/whatsapp/health").status_code == 200
          assert client.get("/api/status").status_code == 200
          print("smoke-tests-passed")
          PY
